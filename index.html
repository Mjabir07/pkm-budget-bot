<style>
:root {
  --gold: #D4A843;
  --gold-light: #F0C060;
  --gold-dim: #8B6914;
  --bg: #080808;
  --bg2: #111111;
  --bg3: #1A1A1A;
  --bg4: #222222;
  --text: #F5F0E8;
  --text2: #A89878;
  --text3: #665533;
  --border: #2A2A1A;
  --success: #4CAF50;
  --danger: #E53935;
  --radius: 16px;
  --shadow: 0 8px 32px rgba(212,168,67,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; overflow:hidden; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); }

/* ── SPLASH ── */
#splash {
  position:fixed; inset:0; background:var(--bg); z-index:999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  transition: opacity 0.6s ease;
}
#splash img { width:120px; height:120px; border-radius:50%; border:3px solid var(--gold); object-fit:cover; box-shadow:0 0 40px rgba(212,168,67,0.4); }
#splash h1 { font-family:'Playfair Display',serif; font-size:32px; color:var(--gold); letter-spacing:2px; }
#splash p { color:var(--text2); font-size:14px; letter-spacing:4px; text-transform:uppercase; }
.splash-bar { width:200px; height:2px; background:var(--bg3); border-radius:2px; overflow:hidden; margin-top:10px; }
.splash-fill { height:100%; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); animation:fill 1.8s ease forwards; }
@keyframes fill { from{width:0} to{width:100%} }

/* ── LAYOUT ── */
#app { height:100%; display:flex; flex-direction:column; opacity:0; transition:opacity 0.5s; }
#app.visible { opacity:1; }

/* ── HEADER ── */
.header {
  background:linear-gradient(135deg,#0F0F00,#1A1500);
  border-bottom:1px solid var(--border);
  padding:16px 20px 12px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.header-left { display:flex; align-items:center; gap:10px; }
.header-avatar { width:36px; height:36px; border-radius:50%; border:2px solid var(--gold); object-fit:cover; }
.header-title { font-family:'Playfair Display',serif; font-size:18px; color:var(--gold); }
.header-sub { font-size:10px; color:var(--text2); letter-spacing:2px; text-transform:uppercase; }
.header-total { text-align:right; }
.header-total-label { font-size:10px; color:var(--text3); }
.header-total-value { font-size:18px; font-weight:700; color:var(--gold); }

/* ── NAV ── */
.nav {
  display:flex; background:var(--bg2); border-bottom:1px solid var(--border);
  flex-shrink:0; overflow-x:auto;
}
.nav::-webkit-scrollbar { display:none; }
.nav-btn {
  flex:1; min-width:70px; padding:10px 4px; border:none; background:none;
  color:var(--text3); font-size:11px; cursor:pointer; border-bottom:2px solid transparent;
  transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:2px;
  font-family:'DM Sans',sans-serif;
}
.nav-btn .nav-icon { font-size:18px; }
.nav-btn.active { color:var(--gold); border-bottom-color:var(--gold); }

/* ── CONTENT ── */
.content { flex:1; overflow-y:auto; padding:16px; -webkit-overflow-scrolling:touch; }
.content::-webkit-scrollbar { width:3px; }
.content::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:3px; }

/* ── CARDS ── */
.card {
  background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; margin-bottom:12px;
}
.card-title { font-size:11px; text-transform:uppercase; letter-spacing:2px; color:var(--text2); margin-bottom:12px; }

/* ── DASHBOARD ── */
.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.summary-card {
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--border); border-radius:var(--radius); padding:14px;
  text-align:center;
}
.summary-icon { font-size:22px; margin-bottom:4px; }
.summary-val { font-size:16px; font-weight:700; color:var(--gold); }
.summary-lbl { font-size:10px; color:var(--text3); margin-top:2px; }

.cat-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.cat-icon-box { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.cat-info { flex:1; min-width:0; }
.cat-name { font-size:12px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cat-bar-wrap { height:4px; background:var(--bg4); border-radius:2px; margin-top:4px; }
.cat-bar { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); }
.cat-amt { font-size:12px; font-weight:600; color:var(--gold); min-width:72px; text-align:right; }

/* ── EXPENSE ROWS ── */
.date-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 0 6px; border-bottom:1px solid var(--border); margin-bottom:8px;
}
.date-label { font-size:12px; font-weight:600; color:var(--gold); }
.date-total { font-size:12px; color:var(--text2); }
.exp-row {
  display:flex; align-items:center; gap:10px; padding:10px 0;
  border-bottom:1px solid var(--border);
}
.exp-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; background:var(--bg3); }
.exp-info { flex:1; min-width:0; }
.exp-desc { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.exp-cat { font-size:10px; color:var(--text3); margin-top:2px; }
.exp-right { text-align:right; }
.exp-amt { font-size:14px; font-weight:700; color:var(--gold); }
.exp-id { font-size:10px; color:var(--text3); }

/* ── ADD FORM ── */
.form-group { margin-bottom:14px; }
.form-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; display:block; }
.form-input {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  border-radius:10px; padding:12px 14px; color:var(--text); font-size:14px;
  font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s;
}
.form-input:focus { border-color:var(--gold-dim); }
.form-input option { background:var(--bg3); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn-primary {
  width:100%; background:linear-gradient(135deg,var(--gold-dim),var(--gold));
  border:none; border-radius:12px; padding:14px; color:#000;
  font-size:15px; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif;
  letter-spacing:1px; margin-top:4px; transition:opacity 0.2s;
}
.btn-primary:active { opacity:0.8; }
.quick-btns { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.quick-btn {
  background:var(--bg3); border:1px solid var(--border); border-radius:20px;
  padding:6px 12px; font-size:12px; color:var(--text2); cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:all 0.2s; white-space:nowrap;
}
.quick-btn:active { background:var(--gold-dim); color:#000; border-color:var(--gold); }

/* ── REPORT ── */
.report-stat { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.report-stat-label { font-size:13px; color:var(--text2); }
.report-stat-value { font-size:14px; font-weight:600; color:var(--gold); }
.pct-bar-wrap { height:6px; background:var(--bg4); border-radius:3px; margin-top:6px; overflow:hidden; }
.pct-bar { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--gold-dim),var(--gold)); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--gold); color:#000; padding:10px 24px; border-radius:30px;
  font-size:13px; font-weight:600; z-index:100; opacity:0;
  transition:all 0.3s; pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.error { background:var(--danger); color:#fff; }

/* ── LOADING ── */
.loading { text-align:center; padding:40px 20px; color:var(--text3); font-size:14px; }
.gold-dot { display:inline-block; width:8px; height:8px; background:var(--gold); border-radius:50%; margin:0 3px; animation:bounce 1s infinite; }
.gold-dot:nth-child(2){animation-delay:0.2s}
.gold-dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

/* ── EMPTY ── */
.empty { text-align:center; padding:60px 20px; }
.empty-icon { font-size:48px; margin-bottom:12px; }
.empty-text { color:var(--text3); font-size:14px; }

/* ── FILTER CHIPS ── */
.filter-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:12px; margin-bottom:4px; }
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip {
  background:var(--bg3); border:1px solid var(--border); border-radius:20px;
  padding:6px 14px; font-size:12px; color:var(--text2); cursor:pointer;
  white-space:nowrap; flex-shrink:0; font-family:'DM Sans',sans-serif;
}
.filter-chip.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold-light); }

/* ── MONTH SELECTOR ── */
.month-selector { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.month-arrow { background:var(--bg3); border:1px solid var(--border); border-radius:8px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; color:var(--gold); }
.month-label { font-family:'Playfair Display',serif; font-size:18px; color:var(--gold); }
</style>
</head>

<script>
const SUPABASE_URL = 'https://onwboqnamdxmwpknnbba.supabase.co';

const CAT_ICONS = {
  "Food & Dining":"🍽️","Transport":"🚇","Grocery & Supermarket":"🛒",
  "Rent & Housing":"🏠","Shopping & Clothes":"🛍️","Fashion":"👔",
  "Cosmetics":"💄","Snacks & Beverages":"🍿","Dessert & Sweets":"🍦",
  "Health & Medical":"💊","Entertainment":"🎬","Family & Kids":"👨‍👩‍👧","Others":"💰"
};
const CATS = Object.keys(CAT_ICONS);
const CAT_COLORS = ["#D4A843","#4ECDC4","#45B7D1","#96CEB4","#FFEAA7","#DDA0DD","#F0A500","#FF6B6B","#A29BFE","#00B894","#E17055","#74B9FF","#888888"];

let currentTab = 'dashboard';
let allExpenses = [];
let filterCat = 'All';
let reportMonth = new Date();

async function api(path) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' }
  });
  return r.json();
}

async function apiPost(data) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/expenses', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(data)
  });
  return r.json();
}

async function apiDelete(id) {
  await fetch(SUPABASE_URL + '/rest/v1/expenses?id=eq.' + id, {
    method: 'DELETE',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
}

function formatAED(n) { return 'AED ' + Number(n).toFixed(2); }
function formatDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function todayDate() { return new Date().toISOString().split('T')[0]; }

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err?' error':'') + ' show';
  setTimeout(() => t.className = 'toast', 2500);
}

async function loadData() {
  allExpenses = await api('expenses?select=*&order=date.desc,created_at.desc');
  const total = allExpenses.reduce((s,e) => s+e.amount, 0);
  document.getElementById('headerTotal').textContent = formatAED(total);
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}

function render() {
  if (currentTab === 'dashboard') renderDashboard();
  else if (currentTab === 'add') renderAdd();
  else if (currentTab === 'expenses') renderExpenses();
  else if (currentTab === 'report') renderReport();
}

function renderDashboard() {
  const total = allExpenses.reduce((s,e) => s+e.amount, 0);
  const today = allExpenses.filter(e => e.date === todayDate());
  const todayTotal = today.reduce((s,e) => s+e.amount, 0);
  const days = new Set(allExpenses.map(e => e.date)).size || 1;

  // by category
  const byCat = {};
  allExpenses.forEach(e => { byCat[e.category] = (byCat[e.category]||0) + e.amount; });
  const sortedCats = Object.entries(byCat).sort((a,b) => b[1]-a[1]);
  const maxAmt = sortedCats.length ? sortedCats[0][1] : 1;

  let html = `
  <div class="summary-grid">
    <div class="summary-card"><div class="summary-icon">💰</div><div class="summary-val">${formatAED(total)}</div><div class="summary-lbl">Total Spent</div></div>
    <div class="summary-card"><div class="summary-icon">📅</div><div class="summary-val">${formatAED(todayTotal)}</div><div class="summary-lbl">Today</div></div>
    <div class="summary-card"><div class="summary-icon">📝</div><div class="summary-val">${allExpenses.length}</div><div class="summary-lbl">Transactions</div></div>
    <div class="summary-card"><div class="summary-icon">📆</div><div class="summary-val">${days}</div><div class="summary-lbl">Days Tracked</div></div>
  </div>
  <div class="card">
    <div class="card-title">Spending by Category</div>`;

  sortedCats.forEach(([cat, amt], i) => {
    const pct = ((amt/total)*100).toFixed(1);
    const color = CAT_COLORS[i % CAT_COLORS.length];
    html += `<div class="cat-row">
      <div class="cat-icon-box" style="background:${color}22">${CAT_ICONS[cat]||'💰'}</div>
      <div class="cat-info">
        <div class="cat-name">${cat}</div>
        <div class="cat-bar-wrap"><div class="cat-bar" style="width:${(amt/maxAmt)*100}%;background:${color}"></div></div>
      </div>
      <div class="cat-amt">${formatAED(amt)}</div>
    </div>`;
  });

  // Today's expenses
  if (today.length) {
    html += `</div><div class="card"><div class="card-title">Today's Expenses</div>`;
    today.forEach(e => {
      html += `<div class="exp-row">
        <div class="exp-icon">${CAT_ICONS[e.category]||'💰'}</div>
        <div class="exp-info"><div class="exp-desc">${e.description}</div><div class="exp-cat">${e.category}</div></div>
        <div class="exp-right"><div class="exp-amt">${formatAED(e.amount)}</div></div>
      </div>`;
    });
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

  const catOptions = CATS.map(c => `<option value="${c}">${CAT_ICONS[c]} ${c}</option>`).join('');
  const quickItems = ['Lunch','Metro','Coffee','Grocery','Taxi','Snacks'];
  const quickBtns = quickItems.map(q => `<button class="quick-btn" onclick="quickFill('${q}')">${q}</button>`).join('');

  document.getElementById('content').innerHTML = `
  <div class="card">
    <div class="card-title">Quick Add</div>
    <div class="quick-btns">${quickBtns}</div>
  </div>
  <div class="card">
    <div class="card-title">Add Expense</div>

      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" id="addDate" type="date" value="${todayDate()}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-input" id="addCat">${catOptions}</select>
    </div>
    <button class="btn-primary" onclick="addExpense()">💾 SAVE EXPENSE</button>
  </div>`;
}

function quickFill(name) {
  document.getElementById('addDesc').value = name;
  const guess = {
    'Lunch':'Food & Dining','Metro':'Transport','Coffee':'Food & Dining',
    'Grocery':'Grocery & Supermarket','Taxi':'Transport','Snacks':'Snacks & Beverages'
  };
  if (guess[name]) document.getElementById('addCat').value = guess[name];
  document.getElementById('addAmt').focus();
}

async function addExpense() {
  const desc = document.getElementById('addDesc').value.trim();
  const amt = parseFloat(document.getElementById('addAmt').value);
  const date = document.getElementById('addDate').value;
  const cat = document.getElementById('addCat').value;
  if (!desc || isNaN(amt) || amt <= 0 || !date) {
    showToast('Please fill all fields!', true); return;
  }
  await apiPost({ description: desc, amount: amt, date, category: cat });
  await loadData();
  showToast('✅ Saved! ' + desc + ' — ' + formatAED(amt));
  document.getElementById('addDesc').value = '';
  document.getElementById('addAmt').value = '';
  document.getElementById('addDate').value = todayDate();
}

function renderExpenses() {
  const chips = ['All', ...CATS];
  let html = `<div class="filter-bar">`;
  chips.forEach(c => {
    html += `<div class="filter-chip ${filterCat===c?'active':''}" onclick="setFilter('${c}')">${c==='All'?'🔍 All':(CAT_ICONS[c]||'')+ ' ' +c}</div>`;
  });
  html += '</div>';

  const filtered = filterCat === 'All' ? allExpenses : allExpenses.filter(e => e.category === filterCat);

  if (!filtered.length) {
    html += '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No expenses found</div></div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  const byDate = {};
  filtered.forEach(e => { if (!byDate[e.date]) byDate[e.date] = []; byDate[e.date].push(e); });

  Object.entries(byDate).sort((a,b) => new Date(b[0])-new Date(a[0])).forEach(([date, items]) => {
    const dayTotal = items.reduce((s,e) => s+e.amount, 0);
    html += `<div class="date-header"><span class="date-label">📅 ${formatDate(date)}</span><span class="date-total">${formatAED(dayTotal)}</span></div>`;
    items.forEach(e => {
      html += `<div class="exp-row">
        <div class="exp-icon">${CAT_ICONS[e.category]||'💰'}</div>
        <div class="exp-info">
          <div class="exp-desc">${e.description}</div>
          <div class="exp-cat">${e.category}</div>
        </div>
        <div class="exp-right">
          <div class="exp-amt">${formatAED(e.amount)}</div>
          <div class="exp-id" onclick="deleteExp(${e.id})" style="cursor:pointer;color:#E53935">🗑️ #${e.id}</div>
        </div>
      </div>`;
    });
  });

  document.getElementById('content').innerHTML = html;
}

function setFilter(cat) { filterCat = cat; renderExpenses(); }

async function deleteExp(id) {
  if (!confirm('Delete this expense?')) return;
  await apiDelete(id);
  await loadData();
  showToast('🗑️ Deleted');
  renderExpenses();
}

function renderReport() {
  const y = reportMonth.getFullYear();
  const m = String(reportMonth.getMonth()+1).padStart(2,'0');
  const from = `${y}-${m}-01`;
  const lastDay = new Date(y, reportMonth.getMonth()+1, 0).getDate();
  const to = `${y}-${m}-${String(lastDay).padStart(2,'0')}`;
  const monthName = reportMonth.toLocaleString('en-GB',{month:'long',year:'numeric'});

  const monthData = allExpenses.filter(e => e.date >= from && e.date <= to);
  const total = monthData.reduce((s,e) => s+e.amount, 0);
  const days = new Set(monthData.map(e => e.date)).size || 1;

  const byCat = {};
  monthData.forEach(e => { byCat[e.category] = (byCat[e.category]||0) + e.amount; });
  const sorted = Object.entries(byCat).sort((a,b) => b[1]-a[1]);

  let html = `
  <div class="month-selector">
    <div class="month-arrow" onclick="changeMonth(-1)">‹</div>
    <div class="month-label">${monthName}</div>
    <div class="month-arrow" onclick="changeMonth(1)">›</div>
  </div>`;

  if (!monthData.length) {
    html += '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No data for this month</div></div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  html += `<div class="card">
    <div class="card-title">Summary</div>
    <div class="report-stat"><span class="report-stat-label">💰 Total Spent</span><span class="report-stat-value">${formatAED(total)}</span></div>
    <div class="report-stat"><span class="report-stat-label">📝 Transactions</span><span class="report-stat-value">${monthData.length}</span></div>
    <div class="report-stat"><span class="report-stat-label">📅 Days Tracked</span><span class="report-stat-value">${days}</span></div>
    <div class="report-stat"><span class="report-stat-label">📈 Avg per Day</span><span class="report-stat-value">${formatAED(total/days)}</span></div>
  </div>
  <div class="card"><div class="card-title">By Category</div>`;

  sorted.forEach(([cat, amt], i) => {
    const pct = total > 0 ? ((amt/total)*100).toFixed(1) : 0;
    const color = CAT_COLORS[i % CAT_COLORS.length];
    html += `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px">${CAT_ICONS[cat]||'💰'} ${cat}</span>
        <span style="font-size:13px;color:var(--gold)">${formatAED(amt)} <span style="color:var(--text3);font-size:11px">(${pct}%)</span></span>
      </div>
      <div class="pct-bar-wrap"><div class="pct-bar" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  });

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function changeMonth(dir) {
  reportMonth = new Date(reportMonth.getFullYear(), reportMonth.getMonth()+dir, 1);
  renderReport();
}

// ── INIT ──────────────────────────────────────────────────
setTimeout(async () => {
  const splash = document.getElementById('splash');
  const app = document.getElementById('app');
  await loadData();
  splash.style.opacity = '0';
  setTimeout(() => { splash.style.display = 'none'; app.classList.add('visible'); render(); }, 600);
}, 1800);
</script>
</body>
</html>
